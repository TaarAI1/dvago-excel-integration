server {
    listen __PORT__;
    server_name _;

    # Allow uploads up to 100 MB (covers large Item Master / QTY / Price CSVs)
    client_max_body_size 100M;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api requests to the FastAPI backend
    # __BACKEND_URL__ is replaced at container startup via sed
    location /api/ {
        proxy_pass __BACKEND_URL__;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Allow large CSV / Excel uploads and long-running import jobs
        client_max_body_size 100M;
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;

        # Required for SSE — disable buffering
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
